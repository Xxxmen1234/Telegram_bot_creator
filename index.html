<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BotFactory - בנה בוט לטלגרם בשניות</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f9; margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #0088cc; }
        
        .tabs { display: flex; cursor: pointer; border-bottom: 2px solid #ddd; margin-bottom: 20px; }
        .tab { padding: 10px 20px; border: 1px solid transparent; border-bottom: none; transition: 0.3s; }
        .tab.active { border-color: #ddd; border-bottom: 2px solid white; background: #fff; font-weight: bold; color: #0088cc; }
        
        .content { display: none; }
        .content.active { display: block; }
        
        textarea { width: 100%; height: 250px; padding: 15px; border: 1px solid #ccc; border-radius: 8px; font-family: 'Courier New', Courier, monospace; font-size: 14px; box-sizing: border-box; resize: vertical; }
        
        .ai-input { background-color: #f0f8ff; border: 1px dashed #0088cc; }
        
        button { width: 100%; padding: 15px; background-color: #0088cc; color: white; border: none; border-radius: 8px; font-size: 18px; cursor: pointer; margin-top: 20px; transition: 0.3s; }
        button:hover { background-color: #006699; }
        
        .token-input { margin-bottom: 20px; width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h1>🚀 BotFactory</h1>
    <p>הכנס את ה-Token של הטלגרם ובחר את שיטת בניית הבוט:</p>
    
    <input type="text" class="token-input" placeholder="הכנס כאן את ה-Bot Token שלך (מ-BotFather)...">

    <div class="tabs">
        <div class="tab active" onclick="showTab('ai')">🪄 יצירה עם AI</div>
        <div class="tab" onclick="showTab('html')">HTML</div>
        <div class="tab" onclick="showTab('python')">Python</div>
        <div class="tab" onclick="showTab('json')">JSON</div>
    </div>

    <div id="ai" class="content active">
        <p>תאר במילים חופשיות מה הבוט צריך לעשות:</p>
        <textarea class="ai-input" placeholder="למשל: אני רוצה בוט למסעדה ששולח תפריט כשלוקצים על 'תפריט' ונותן מיקום כשלוקצים על 'איפה אנחנו?'"></textarea>
    </div>

    <div id="html" class="content">
        <p>כתוב את מבנה הבוט ב-HTML:</p>
        <textarea placeholder="<bot> <command name='start'>...</command> </bot>"></textarea>
    </div>

    <div id="python" class="content">
        <p>כתוב קוד Python (למתקדמים):</p>
        <textarea placeholder="def start(update, context): ..."></textarea>
    </div>

    <div id="json" class="content">
        <p>הגדר את הבוט בפורמט JSON:</p>
        <textarea placeholder='{ "commands": [...] }'></textarea>
    </div>

    <button onclick="deployBot()">צור והפעל את הבוט שלי!</button>
</div>

<script>
    function showTab(tabId) {
        document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        event.currentTarget.classList.add('active');
    }

    function deployBot() {
        alert("שולח נתונים לשרת... הבוט שלך בדרך!");
        // כאן נחבר בעתיד את ה-Fetch ל-Backend שלנו
    }
</script>

</body>
</html>
