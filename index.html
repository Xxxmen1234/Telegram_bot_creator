<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BotFactory - יוצר הבוטים שלך</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; margin: 0; padding: 20px; text-align: center; }
        .container { max-width: 800px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        h1 { color: #0088cc; }
        .tabs { display: flex; justify-content: center; margin-bottom: 20px; gap: 10px; }
        .tab { padding: 10px 20px; background: #eee; cursor: pointer; border-radius: 5px; transition: 0.3s; }
        .tab.active { background: #0088cc; color: white; }
        .content { display: none; }
        .content.active { display: block; }
        textarea { width: 100%; height: 200px; margin-top: 10px; border-radius: 8px; border: 1px solid #ddd; padding: 10px; font-family: monospace; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #28a745; color: white; border: none; border-radius: 8px; font-size: 18px; cursor: pointer; }
        button:hover { background: #218838; }
        .status { margin-top: 15px; color: #555; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>🤖 BotFactory</h1>
    <p>בנה בוט לטלגרם בקלות ובחינם</p>

    <input type="text" id="botToken" placeholder="הכנס כאן את ה-Bot Token מ-BotFather">
    <input type="text" id="geminiKey" placeholder="הכנס כאן את ה-Gemini API Key (אופציונלי ל-AI)">

    <div class="tabs">
        <div class="tab active" onclick="openTab(event, 'aiTab')">🪄 AI</div>
        <div class="tab" onclick="openTab(event, 'htmlTab')">HTML</div>
        <div class="tab" onclick="event, openTab(event, 'jsonTab')">JSON</div>
    </div>

    <div id="aiTab" class="content active">
        <textarea id="aiInput" placeholder="תאר את הבוט שלך... (למשל: בוט שמוכר פיצה ומציג תפריט)"></textarea>
    </div>
    <div id="htmlTab" class="content">
        <textarea id="htmlInput" placeholder="<bot> <command name='start'> שלום! </command> </bot>"></textarea>
    </div>
    <div id="jsonTab" class="content">
        <textarea id="jsonInput" placeholder='{ "commands": [...] }'></textarea>
    </div>

    <button onclick="deploy()">הפעל את הבוט עכשיו!</button>
    <div id="status" class="status"></div>
</div>

<script>
    function openTab(evt, tabName) {
        var contents = document.getElementsByClassName("content");
        for (var i = 0; i < contents.length; i++) contents[i].classList.remove("active");
        var tabs = document.getElementsByClassName("tab");
        for (var i = 0; i < tabs.length; i++) tabs[i].classList.remove("active");
        document.getElementById(tabName).classList.add("active");
        evt.currentTarget.classList.add("active");
    }

    async function deploy() {
        const status = document.getElementById('status');
        status.innerText = "שולח בקשה לשרת... המתן";
        
        const data = {
            token: document.getElementById('botToken').value,
            gemini_key: document.getElementById('geminiKey').value,
            type: document.querySelector('.tab.active').innerText.includes('AI') ? 'ai' : 'code',
            content: document.querySelector('.content.active textarea').value
        };

        try {
            // כאן נחליף בעתיד את הכתובת לכתובת של השרת שלך ב-Render
            const response = await fetch('https://telegram-bot-creator-9bhw.onrender.com/create_bot', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            const result = await response.json();
            status.innerText = "הבוט הופעל בהצלחה!";
        } catch (error) {
            status.innerText = "שגיאה: השרת עדיין לא מחובר.";
        }
    }
</script>
</body>
</html>
